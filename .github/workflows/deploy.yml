name: Deploy no GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build estático
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar export estático
        run: npm run build
        env:
          CUSTOM_DOMAIN: maicondev.com
          NODE_ENV: production

      - name: Enviar artefato para o GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    name: Publicar no GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://maicondev.com
    steps:
      - name: Implantar site
        id: implantacao
        uses: actions/deploy-pages@v4

      - name: Ativar certificado HTTPS (Let's Encrypt)
        env:
          GH_TOKEN: ${{ github.token }}
          CUSTOM_DOMAIN: maicondev.com
        run: |
          echo "Configurando domínio personalizado e forçando HTTPS..."
          curl -sf -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
            -d "{\"cname\":\"${CUSTOM_DOMAIN}\",\"https_enforced\":true}"

          echo "Verificando status do certificado..."
          curl -sf \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
            | jq '{cname, https_enforced, status, html_url}'

name: Deploy no GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build estático
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar export estático
        run: npm run build
        env:
          CUSTOM_DOMAIN: maicondev.com
          NODE_ENV: production

      - name: Enviar artefato para o GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    name: Publicar no GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://maicondev.com
    steps:
      - name: Implantar site
        id: implantacao
        uses: actions/deploy-pages@v4

      - name: Ativar certificado HTTPS (Let's Encrypt)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          CUSTOM_DOMAIN: maicondev.com
        run: |
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          auth=(-H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${GH_TOKEN}" -H "X-GitHub-Api-Version: 2022-11-28")

          echo "Estado atual do GitHub Pages:"
          curl -sS "${auth[@]}" "$api" | jq '{cname, https_enforced, status, html_url}'

          echo "Configurando domínio personalizado..."
          http_code=$(curl -sS -o /tmp/pages-cname.json -w "%{http_code}" -X PATCH "${auth[@]}" "$api" \
            -d "{\"cname\":\"${CUSTOM_DOMAIN}\"}")
          echo "PATCH cname → HTTP ${http_code}"
          jq . /tmp/pages-cname.json

          echo "Tentando ativar Enforce HTTPS..."
          http_code=$(curl -sS -o /tmp/pages-https.json -w "%{http_code}" -X PATCH "${auth[@]}" "$api" \
            -d '{"https_enforced":true}')
          echo "PATCH https_enforced → HTTP ${http_code}"
          jq . /tmp/pages-https.json

          if [ "$http_code" != "200" ]; then
            echo "::warning::HTTPS não pôde ser ativado via API (HTTP ${http_code}). Ative em Settings → Pages → Enforce HTTPS quando o certificado estiver disponível."
            exit 0
          fi

          echo "Configuração final:"
          curl -sS "${auth[@]}" "$api" | jq '{cname, https_enforced, status, html_url}'
